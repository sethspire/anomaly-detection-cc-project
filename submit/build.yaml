# much of the structure of the template is auto-generated by ChatGPT as suggested by instructor. It is heavily edited by Seth Spire to meet project requirements
AWSTemplateFormatVersion: 2010-09-09
Description: DS5220 Project 1 Deployment Stack

Parameters:
  MyIP:
    Description: The IP address range that can be used to SSH to the EC2 instances
    Type: String
    MinLength: 9
    MaxLength: 18
    Default: 0.0.0.0/0
    ConstraintDescription: must be a valid IP CIDR range of the form x.x.x.x/x.
  KeyName:
    Description: Name of an existing EC2 key pair to allow SSH access to the instances
    Type: 'AWS::EC2::KeyPair::KeyName'

Resources:

  #################################
  # S3 Bucket --
  #################################
  AppBucket:
    Type: AWS::S3::Bucket
    DependsOn:
      - AppTopic
      - SNSPolicy
    Properties:
      BucketName: !Sub ds5220-project1-${AWS::AccountId}
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      NotificationConfiguration:
        TopicConfigurations:
          - Event: s3:ObjectCreated:*
            Topic: !Ref AppTopic
            Filter:
              S3Key:
                Rules:
                  - Name: prefix
                    Value: raw/
                  - Name: suffix
                    Value: .csv

  #################################
  # IAM Role --
  #################################
  AppRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BucketAccessPolicy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action: 
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt AppBucket.Arn
                  - !Sub ${AppBucket.Arn}/*

  AppInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles: [!Ref AppRole]

  #################################
  # Security Group --
  #################################
  AppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Allow SSH and API
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: !Ref MyIP
          Description: Allow SSH from only your IP
        - IpProtocol: tcp
          FromPort: 8000
          ToPort: 8000
          CidrIp: 0.0.0.0/0
          Description: Allow API/HTTP traffic from anywhere

  #################################
  # EC2 Instance --
  #################################
  AppInstance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      IamInstanceProfile: !Ref AppInstanceProfile
      SecurityGroupIds: [!Ref AppSecurityGroup]
      ImageId: ami-0b6c6ebed2801a5cb # Ubuntu 24.04 LTS, grabbed from AWS Console
      KeyName: !Ref KeyName
      BlockDeviceMappings:
        - DeviceName: /dev/sda1
          Ebs:
            VolumeSize: 16
            VolumeType: gp3
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          apt update -y
          apt install -y python3 python3-venv python3-pip git

          cd /home/ubuntu
          git clone https://github.com/sethspire/anomaly-detection-cc-project app
          cd app

          python3 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip
          pip install -r requirements.txt

          echo "export BUCKET_NAME='${AppBucket}'" >> /home/ubuntu/.bashrc
          echo "BUCKET_NAME='${AppBucket}'" >> /etc/environment
          export BUCKET_NAME='${AppBucket}'

          cat <<EOF > /etc/systemd/system/fastapi.service
          [Unit]
          Description=FastAPI Service
          After=network.target

          [Service]
          User=ubuntu
          WorkingDirectory=/home/ubuntu/app
          Environment="BUCKET_NAME=${AppBucket}"
          ExecStart=/home/ubuntu/app/venv/bin/fastapi run app.py --host 0.0.0.0 --port 8000
          Restart=always

          [Install]
          WantedBy=multi-user.target
          EOF

          sudo mkdir -p /var/log/fastapi
          sudo chown -R ubuntu:ubuntu /var/log/fastapi
          sudo chmod -R 755 /var/log/fastapi

          systemctl daemon-reload
          systemctl enable fastapi
          systemctl start fastapi

  #################################
  # Elastic IP --
  #################################
  AppEIP:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc

  AppEIPAssoc:
    Type: AWS::EC2::EIPAssociation
    Properties:
      InstanceId: !Ref AppInstance
      EIP: !Ref AppEIP

  #################################
  # SNS Topic & Subscription --
  #################################
  AppTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: ds5220-dp1

  AppSubscription:
    Type: AWS::SNS::Subscription
    DependsOn:
      - AppInstance
      - AppTopic
      - AppEIP
    Properties:
      TopicArn: !Ref AppTopic
      Protocol: http
      Endpoint: !Sub http://${AppEIP.PublicIp}:8000/notify

  #################################
  # S3 Event → SNS Policy (suggested by chatGPT) --
  #################################
  SNSPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics: [!Ref AppTopic]
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: sns:Publish
            Resource: !Ref AppTopic

Outputs:
  ElasticIP:
    Value: !Ref AppEIP
  BucketName:
    Value: !Ref AppBucket